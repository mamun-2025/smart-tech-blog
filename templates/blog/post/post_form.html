
{% extends "base.html" %}

{% block content%}

<div class="container mt-4">
   <h2>Create New Post</h2>
   <hr>
   <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Published</button>
   </form>
</div>
{% endblock %}
